<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Corazón Coffee Bar | Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">CORAZÓN<span class="heart-icon">♥</span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="menu.html">Menu</a>
            <a href="reviews.html">Reviews</a>
            <a href="order.html">Order</a>
        </div>
    </nav>

    <header class="page-header hero" style="background-image: url('home1.png&auto=format&fit=crop&w=1600&q=80');">
        <div class="hero-text-box">
            <h1>CORAZÓN</h1>
            <p>Coffee Bar</p>
        </div>
    </header>

    <section class="content-section alt-bg">
        <div class="section-header">
            <h2>Featured Menu</h2>
            <div class="section-divider"></div>
        </div>
        <div class="slideshow-container">
            <div class="mySlides fade">
                <img src="cafedeolla.png" alt="Café de Olla">
                <div class="slide-text">Café de Olla</div>
            </div>
            <div class="mySlides fade">
                <img src="horchatalatte.jpg" alt="Horchata Latte">
                <div class="slide-text">Horchata Latte</div>
            </div>
            <div class="mySlides fade">
                <img src="thecortado.jpg" alt="The Cortado">
                <div class="slide-text">The Cortado</div>
            </div>
            <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
            <a class="next" onclick="plusSlides(1)">&#10095;</a>
        </div>
    </section>

    <footer>
        <div class="footer-logo">CORAZÓN</div>
        <div class="footer-text">© 2026 Corazón Coffee Bar</div>
    </footer>

    <script>
        let slideIndex = 1;
        showSlides(slideIndex);
        function plusSlides(n) { showSlides(slideIndex += n); }
        function showSlides(n) {
            let i;
            let slides = document.getElementsByClassName("mySlides");
            if (n > slides.length) {slideIndex = 1}    
            if (n < 1) {slideIndex = slides.length}
            for (i = 0; i < slides.length; i++) { slides[i].style.display = "none"; }
            slides[slideIndex-1].style.display = "block";  
        }
    </script>
</body>
</html>
